---
name: push

on: # yamllint disable-line rule:truthy
  push: null
  pull_request: null

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  attestations: none
  checks: none
  contents: read
  deployments: none
  id-token: none
  issues: none
  discussions: none
  packages: read
  pages: none
  pull-requests: read
  repository-projects: none
  security-events: none
  statuses: none

jobs:
  super-linter:
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          persist-credentials: false
      - run: mv -vf .github/linters/biome.json .github/linters/commitlint.config.js ./
      - uses: super-linter/super-linter/slim@9e863354e3ff62e0727d37183162c4a88873df41
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: ${{ !contains(github.event_name, 'pull_request') }}
          VALIDATE_PYTHON_PYINK: false
          VALIDATE_PYTHON_BLACK: false
          VALIDATE_PYTHON_PYLINT: false
          # PYTHON_MYPY deferred until phase-2 of the §21.7 migration; super-linter
          # invokes mypy per-file which can't reconcile sibling main.py files
          # under hyphenated tool dirs as separate modules.
          VALIDATE_PYTHON_MYPY: false
          VALIDATE_GO: false
          IGNORE_GITIGNORED_FILES: true
          SAVE_SUPER_LINTER_OUTPUT: false
          MULTI_STATUS: false
          LOG_LEVEL: WARN
  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: 0.11.12
      - name: Run mypy --strict per Python project
        run: |
          set -euo pipefail
          # discover every project except the .venv-shadowed roots; each pyproject
          # owns its mypy scope via [tool.mypy] files = [...] so sibling main.py
          # files in adjacent projects don't collide as duplicate modules
          while IFS= read -r -d '' proj; do
            dir="$(dirname "$proj")"
            echo "::group::$dir"
            uv sync --frozen --project "$dir"
            (cd "$dir" && uv run mypy --strict)
            echo "::endgroup::"
          done < <(find . -name pyproject.toml -not -path '*/.venv/*' -print0)
  notify-clavis:
    needs: [super-linter, mypy]
    if: >-
      success() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/master'
    environment: notify-clavis
    runs-on: ubuntu-latest
    steps:
      - uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697
        with:
          token: ${{ secrets.REPOSITORY_DISPATCH_CLAVIS }}
          repository: streambinder/clavis
          event-type: unciae-sync
          client-payload: >-
            {
              "ref": "${{ github.ref }}",
              "sha": "${{ github.sha }}"
            }
  notify-imperium:
    needs: [super-linter, mypy]
    if: >-
      success() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/master'
    environment: notify-imperium
    runs-on: ubuntu-latest
    steps:
      - uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697
        with:
          token: ${{ secrets.REPOSITORY_DISPATCH_IMPERIUM }}
          repository: streambinder/imperium
          event-type: unciae-sync
          client-payload: >-
            {
              "ref": "${{ github.ref }}",
              "sha": "${{ github.sha }}"
            }
